services:
  - type: web
    name: invoice-system
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --skip-generate --accept-data-loss && npx tsx prisma/seed.ts && node node_modules/.bin/next start -p $PORT
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        value: file:./dev.db
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
